version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: todo-app-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-todoapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todoapp_password}
      POSTGRES_DB: ${POSTGRES_DB:-todoapp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todoapp} -d ${POSTGRES_DB:-todoapp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    image: ghcr.io/inbatamilan126/todo-app/server:latest
    container_name: todo-app-server
    restart: unless-stopped
    environment:
      PORT: ${SERVER_PORT:-5000}
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-todoapp}:${POSTGRES_PASSWORD:-todoapp_password}@postgres:5432/${POSTGRES_DB:-todoapp}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-session-secret-in-production}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      API_URL: ${API_URL:-http://localhost:5000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    ports:
      - "${SERVER_PORT:-5000}:5000"

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-}
    image: ghcr.io/inbatamilan126/todo-app/client:latest
    container_name: todo-app-client
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "${CLIENT_HTTP_PORT:-8080}:80"
    depends_on:
      - server

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
